spring:
  application:
    name: bookMyShow
  datasource:
    url: jdbc:h2:mem:bookmyshow
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          batch_size: 30       # Batch inserts for seat seeding
        order_inserts: true
        order_updates: true
  h2:
    console:
      enabled: true
      path: /h2-console

# JWT Configuration
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000 # 24 hours in milliseconds

  # Cache — Caffeine in-process (no Redis required)
  # Spring Boot auto-configures CaffeineCacheManager when caffeine jar is present.
  # No manual Caffeine API code needed — spec string is parsed internally by Spring.
  cache:
    type: caffeine
    cache-names:
      - movies          # @Cacheable("movies") — getAllMovies()
      - shows           # @Cacheable("shows")  — browseShows()
    caffeine:
      # Spec format: maximumSize=N,expireAfterWrite=Xs
      # Both caches share this spec. 10-min TTL is safe because
      # @CacheEvict on write operations (create/update/delete/book/cancel)
      # keeps both caches fresh immediately after any mutation.
      spec: maximumSize=1000,expireAfterWrite=600s

# Rate Limiting — Bucket4j (token bucket per IP)
rate-limit:
  booking:
    capacity: 3          # max 10 tokens in bucket
    refill-tokens: 3    # refill 10 tokens…
    refill-minutes: 1     # …every 1 minute  → 10 requests/min per IP

# Server Configuration
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Logging Configuration
logging:
  level:
    com.digvijay.bookMyShow: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

  file:
    name: logs/bookmyshow-application.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB